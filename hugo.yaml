baseURL: https://lutherananswers.netlify.app/
language:
  locale: en-us
title: Lutheran Answers

caches:
  images:
    dir: :cacheDir/images

markup:
  goldmark:
    renderer:
      unsafe: true

enableRobotsTXT: true
enableGitInfo: true
enableEmoji: false

module:
  imports:
    - path: github.com/imfing/hextra

menus:
  main:
    - name: Answers
      pageRef: /answers
      weight: 1 

    - name: Confessions
      pageRef: /confessions
      weight: 2
    
    - name: Articles
      pageRef: /Articles
      weight: 3

#    - name: Merch
#      pageRef: /
#      weight: 4

    - name: Newsletter
      url: https://buttondown.com/lutherananswers
      weight: 5

    - name: Search
      params:
        type: search

    - name: X
      url: https://x.com/lutherananswers
      params:
        icon: x-twitter
    
    - name: youtube
      url: https://www.youtube.com/@lutherananswers
      params:
        icon: youtube

    - name: Theme Toggle
      params:
        type: theme-toggle
    
    - name: Donate
      url: https://donate.stripe.com/5kQdRb8WJ6cD4q684Bds400
      params:
        type: link
        icon: donate

  footer:
    - name: Answers
      pageRef: /answers/
      weight: 1
    
    - name: Confessions
      pageRef: /confessions/
      weight: 2
    
    - name: Articles
      pageRef: /articles/
      weight: 3
    
    - name: Newsletter
      url: https://buttondown.com/lutherananswers
      weight: 4
    
    - name: Big Craig
      pageRef: /big-craig/
      weight: 5

    - name: Contact
      pageRef: /contact/
      weight: 6

  social:
    - name: YouTube
      url: https://www.youtube.com/@lutherananswers
      weight: 1
      params:
        icon: fa-brands fa-youtube

    - name: Spotify
      url: https://open.spotify.com/show/4UMWuMKo1ySP7jfsem6VeN
      weight: 2
      params:
        icon: fa-brands fa-spotify

    - name: Apple Podcasts
      url: https://podcasts.apple.com/us/podcast/lutheran-answers/id1566549301
      weight: 3
      params:
        icon: fa-solid fa-podcast

    - name: Elon Musk's X
      url: https://x.com/lutherananswers
      weight: 4
      params:
        icon: fa-brands fa-x-twitter
    
    - name: Donate
      url: https://donate.stripe.com/5kQdRb8WJ6cD4q684Bds400
      weight: 5
      params:
        icon: fa-sharp fa-heart

outputs:
  page: [html, markdown]
  section: [html, rss, markdown]

params:

#  banner:
#    key: 'announcement-xxx'
#    message: |
#      🎉 Welcome! [Hextra](https://github.com/hextra/hextra) is a static site generator that helps you build modern websites.


  blog:
    list:
      displayTags: true
  
  toc:
    displayTags: true

  defaultSection: answers # Default section for shortcode.

  externalLinkDecoration: true

  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: logo-wordless.svg
      dark: logo-wordless-dark.svg
      link: /
      width: 60
      height: 60

  page:
    # full (100%), wide (90rem), normal (1280px)
    width: wide

    contextMenu:
      enable: true
      links:
      - name: "Ask AI"
        url: "/big-craig?query={markdown_url}"
        icon: "sparkles"

  footer:
    displayCopyright: true
    displayPoweredBy: true

  displayUpdatedDate: true
  dateFormat: "January 2, 2006"

  editURL:
    enable: true
    base: "https://github.com/remysheppard/lutherananswers/edit/main/content/"