# =============================================================================
# SITE BASICS
# =============================================================================
baseURL: https://lutherananswers.netlify.app/
title: Lutheran Answers
theme: hextra

language:
  locale: en-us

enableRobotsTXT: true
enableGitInfo: true
enableEmoji: false

# -----------------------------------------------------------------------------
# Theme module (Hextra)
# -----------------------------------------------------------------------------
#module:
#  imports:
#    - path: github.com/imfing/hextra

# -----------------------------------------------------------------------------
# Output formats — enables Markdown output + context menu "copy as markdown"
# -----------------------------------------------------------------------------
outputs:
  page: [html, markdown]
  section: [html, rss, markdown]

# -----------------------------------------------------------------------------
# Markdown rendering
# -----------------------------------------------------------------------------
markup:
  goldmark:
    renderer:
      unsafe: true

# -----------------------------------------------------------------------------
# Caching
# -----------------------------------------------------------------------------
caches:
  images:
    dir: :cacheDir/images


# =============================================================================
# MENUS
# =============================================================================

menus:

  # ---------------------------------------------------------------------------
  # Main nav (top navbar)
  # ---------------------------------------------------------------------------
  main:
    - name: Answers
      pageRef: /answers
      weight: 1

    - name: Confessions
      pageRef: /confessions
      weight: 2

    #    - name: Merch
    #      pageRef: /
    #      weight: 4

    - name: Newsletter
      url: https://buttondown.com/lutherananswers
      weight: 5

    - name: Search
      params:
        type: search

    - name: X
      url: https://x.com/lutherananswers
      params:
        icon: x-twitter

    - name: youtube
      url: https://www.youtube.com/@lutherananswers
      params:
        icon: youtube

    - name: Theme Toggle
      params:
        type: theme-toggle

    - name: Donate
      url: https://donate.stripe.com/5kQdRb8WJ6cD4q684Bds400
      params:
        type: link
        icon: donate

  # ---------------------------------------------------------------------------
  # Footer nav (site links column)
  # ---------------------------------------------------------------------------
  footer:
    - name: Answers
      pageRef: /answers/
      weight: 1

    - name: Confessions
      pageRef: /confessions/
      weight: 2

    - name: Articles
      pageRef: /articles/
      weight: 3

    - name: Newsletter
      url: https://buttondown.com/lutherananswers
      weight: 4

    - name: Big Craig
      pageRef: /big-craig/
      weight: 5

    - name: Contact
      pageRef: /contact/
      weight: 6

  # ---------------------------------------------------------------------------
  # Footer nav (social / listen & support column)
  # ---------------------------------------------------------------------------
  social:
    - name: YouTube
      url: https://www.youtube.com/@lutherananswers
      weight: 1
      params:
        icon: fa-brands fa-youtube

    - name: Spotify
      url: https://open.spotify.com/show/4UMWuMKo1ySP7jfsem6VeN
      weight: 2
      params:
        icon: fa-brands fa-spotify

    - name: Apple Podcasts
      url: https://podcasts.apple.com/us/podcast/lutheran-answers/id1566549301
      weight: 3
      params:
        icon: fa-solid fa-podcast

    - name: Elon Musk's X
      url: https://x.com/lutherananswers
      weight: 4
      params:
        icon: fa-brands fa-x-twitter

    - name: Donate
      url: https://donate.stripe.com/5kQdRb8WJ6cD4q684Bds400
      weight: 5
      params:
        icon: fa-sharp fa-heart


# =============================================================================
# THEME PARAMETERS
# =============================================================================

params:

  # ---------------------------------------------------------------------------
  # Banner (disabled)
  # ---------------------------------------------------------------------------
  banner:
    key: 'announcement-xxx'
    message: |
      🎉 Check out the new website! Yes, it's technically the old website, but better and faster! [Let me know](/contact/) if you find any bugs!

  # ---------------------------------------------------------------------------
  # Navbar
  # ---------------------------------------------------------------------------
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: logo-wordless.svg
      dark: logo-wordless-dark.svg
      link: /
      width: 60
      height: 60

  # ---------------------------------------------------------------------------
  # Page layout
  # ---------------------------------------------------------------------------
  page:
    # full (100%), wide (90rem), normal (1280px)
    width: full

    contextMenu:
      enable: true
      links:
        - name: "Ask Big Craig"
          url: "/big-craig?query={url}&title={title}"
          icon: big-craig

        - name: "Open in Grok"
          url: "https://grok.com/?q=I%27m+looking+at+this+article%3A+{url}%0AHelp+me+understand+it."
          icon: grok

        - name: "Open in Claude"
          url: "https://claude.ai/new?q=I%27m+looking+at+this+article%3A+{url}%0AHelp+me+understand+it."
          icon: claude

  # ---------------------------------------------------------------------------
  # Blog & table of contents
  # ---------------------------------------------------------------------------
  blog:
    list:
      displayTags: true

  toc:
    displayTags: true

  defaultSection: answers # Default section for shortcode.

  # ---------------------------------------------------------------------------
  # Links
  # ---------------------------------------------------------------------------
  externalLinkDecoration: true

  # ---------------------------------------------------------------------------
  # Footer
  # ---------------------------------------------------------------------------
  footer:
    displayCopyright: true
    displayPoweredBy: true

  # ---------------------------------------------------------------------------
  # Page metadata (last updated date)
  # ---------------------------------------------------------------------------
  displayUpdatedDate: true
  dateFormat: "January 2, 2006"

  # ---------------------------------------------------------------------------
  # Edit-on-GitHub link
  # ---------------------------------------------------------------------------
  editURL:
    enable: true
    base: "https://github.com/remysheppard/lutherananswers/edit/main/content/"