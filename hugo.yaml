baseURL: https://lutherananswers.netlify.app/
language:
  locale: en-us
title: Lutheran Answers

caches:
  images:
    dir: :cacheDir/images

markup:
  goldmark:
    renderer:
      unsafe: true

enableRobotsTXT: true
enableGitInfo: true
enableEmoji: false

module:
  imports:
    - path: github.com/imfing/hextra

menu:
  main:
    - name: Answers
      pageRef: /answers
      weight: 1 

    - name: Confessions
      pageRef: /confessions
      weight: 2
    
    - name: Articles
      pageRef: /Articles
      weight: 3

#    - name: Merch
#      pageRef: /
#      weight: 4

    - name: Newsletter
      url: https://buttondown.com/lutherananswers
      weight: 5

    - name: Big Craig
      pre: '<i class="fa-thin fa-microchip-ai"></i>'
      pageRef: /big-Craig
      weight: 6

    - name: Search
      params:
        type: search

    - name: X
      url: https://x.com/lutherananswers
      params:
        icon: x-twitter
    
    - name: youtube
      url: https://www.youtube.com/@lutherananswers
      params:
        icon: youtube

    - name: Theme Toggle
      params:
        type: theme-toggle

outputs:
  page: [html, markdown]
  section: [html, rss, markdown]

params:

  blog:
    list:
      displayTags: true
  
  toc:
    displayTags: true

  defaultSection: answers # Default section for shortcode.

  externalLinkDecoration: true

  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: logo-wordless.svg
      dark: logo-wordless-dark.svg
      link: /
      width: 60
      height: 60

  page:
    # full (100%), wide (90rem), normal (1280px)
    width: wide

    contextMenu:
      enable: false
      links:
      - name: "Ask AI"
        url: "/big-craig?query={markdown_url}"
        icon: "sparkles"

  footer:
    displayCopyright: true
    displayPoweredBy: true

  displayUpdatedDate: true
  dateFormat: "January 2, 2006"

  editURL:
    enable: true
    base: "https://github.com/remysheppard/lutherananswers/edit/main/content/"